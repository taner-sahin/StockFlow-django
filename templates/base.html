{% load static %}
<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}StockFlow{% endblock %}</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>

  <body>
    <!-- NAVBAR -->
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg bg-white border-bottom py-3">
      <div class="container">
        <!-- Logo -->
        <a class="navbar-brand fw-bold" href="{% url 'home' %}">StockFlow</a>

        <!-- Mobile Toggle -->
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Menu -->
        <div class="collapse navbar-collapse" id="navMenu">
          <!-- LEFT MENU -->
          <ul class="navbar-nav mx-auto">
            <li class="nav-item">
              <a class="nav-link" href="{% url 'home' %}">Home</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{% url 'home' %}#categories"
                >Categories</a
              >
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{% url 'home' %}#products">Products</a>
            </li>
          </ul>

          <!-- RIGHT SIDE -->
          <div class="d-flex gap-3 align-items-center">
            {% if user.is_authenticated %}
            <span class="small text-muted">Merhaba, {{ user.username }}</span>
            <a href="{% url 'logout' %}" class="text-dark">Çıkış</a>
            {% else %}
            <a href="{% url 'login' %}" class="text-dark">Giriş</a>
            <a href="{% url 'register' %}" class="text-dark">Kayıt Ol</a>
            {% endif %}

            <a href="#"><i class="bi bi-bag"></i></a>
          </div>
        </div>
      </div>
    </nav>
    {% block content %}{% endblock %}

    <!-- FOOTER -->
    <footer class="bg-white border-top py-4 mt-5">
      <div class="container text-center">
        <h6 class="fw-bold">StockFlow</h6>
        <small class="text-muted">Kozmetik ve bakım ürünleri</small>
      </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
